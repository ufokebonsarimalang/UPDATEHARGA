<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Harga Produk</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#edf3f8;
color:#222;
min-height:100vh;
}

button{
border:none;
cursor:pointer;
font-family:inherit;
}

input{
font-family:inherit;
outline:none;
}

#loginBox{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:24px;
padding:40px;
box-shadow:0 20px 45px rgba(0,0,0,.12);
text-align:center;
}

.logo{
width:80px;
height:80px;
margin:auto;
margin-bottom:20px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
color:#fff;
}

.card h2{
font-size:30px;
margin-bottom:10px;
color:#2563eb;
}

.subtitle{
color:#666;
margin-bottom:30px;
line-height:1.6;
}

input{
width:100%;
padding:15px;
border:1px solid #d9d9d9;
border-radius:14px;
font-size:15px;
margin-bottom:15px;
transition:.2s;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

.btn-login{
width:100%;
padding:15px;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:600;
transition:.25s;
}

.btn-login:hover{
background:#1d4ed8;
}

#produk{
display:none;
max-width:1100px;
margin:auto;
padding:25px;
}

.header{
background:#2563eb;
color:#fff;
padding:25px;
border-radius:20px;
margin-bottom:25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.header h2{
margin-bottom:5px;
}

#listProduk{
display:grid;
gap:18px;
}

.item{
background:#fff;
border-radius:20px;
padding:22px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,.08);
transition:.25s;
}

.item:hover{
transform:translateY(-3px);
}

.badge{
display:inline-block;
padding:5px 12px;
border-radius:30px;
background:#dbeafe;
color:#2563eb;
font-size:12px;
font-weight:600;
margin-bottom:10px;
}

.tipe{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.label{
font-size:13px;
color:#777;
}

.harga{
font-size:30px;
font-weight:700;
color:#16a34a;
margin-top:6px;
}

.btn-ubah{
background:#2563eb;
color:#fff;
padding:14px 22px;
border-radius:12px;
font-weight:600;
}

.btn-ubah:hover{
background:#1d4ed8;
}

#formEdit{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
padding:20px;
}

.popup{
width:100%;
max-width:450px;
background:#fff;
padding:30px;
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.popup h3{
margin-bottom:20px;
text-align:center;
color:#2563eb;
}

.popup label{
display:block;
margin:15px 0 6px;
font-weight:600;
}

.btn-batal{
width:100%;
margin-top:10px;
padding:14px;
background:#ececec;
border-radius:12px;
}

@media(max-width:768px){

.item{
flex-direction:column;
align-items:flex-start;
gap:18px;
}

.btn-ubah{
width:100%;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

}

</style>

</head>
<body>

<!-- ================= LOGIN ================= -->

<div id="loginBox">

    <div class="card">

        <div class="logo">
            🏪
        </div>

        <h2>UPDATE HARGA</h2>

        <div class="subtitle">
            Silakan login menggunakan PIN Sales
        </div>

        <input
            type="password"
            id="pin"
            placeholder="Masukkan PIN">

        <button
            class="btn-login"
            onclick="login()">

            LOGIN

        </button>

    </div>

</div>

<!-- ================= HALAMAN PRODUK ================= -->

<div id="produk">

    <div class="header">

        <div>

            <h2>
                📋 Update Harga Produk
            </h2>

            <div id="namaBrand"
                 style="opacity:.9;font-size:14px;">
            </div>

        </div>

        <div>

            <button
                onclick="logout()"
                style="
                background:white;
                color:#2563eb;
                padding:12px 18px;
                border-radius:12px;
                font-weight:bold;">

                Logout

            </button>

        </div>

    </div>


    <input

        id="search"

        placeholder="🔍 Cari tipe produk..."

        style="
        margin-bottom:20px;
        background:white;
        ">


    <div id="listProduk"></div>

</div>


<!-- ================= POPUP ================= -->

<div id="formEdit">

    <div class="popup">

        <h3>💰 Edit Harga</h3>

        <label>Harga Lama</label>

        <input
            id="hargaLama"
            disabled>

        <label>Harga Baru</label>

        <input
            id="hargaBaru">

        <label>Catatan</label>

        <input
            id="catatan">

        <button
            class="btn-login"
            onclick="simpan()">

            ✔ SIMPAN

        </button>

        <button
            class="btn-batal"
            onclick="closeEdit()">

            BATAL

        </button>

    </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxKe1KXs3Qigmf7UePOrVfzHt6F3JeXkUMl_sN1-FV4qC5QWGa0EUxgBYJfBbN_8el8LA/exec";

let selectedTipe="";
let semuaProduk=[];
  /* ============================
   LOGIN
============================ */

function login(){

    const pin=document.getElementById("pin").value.trim();

    if(pin==""){
        alert("Masukkan PIN terlebih dahulu.");
        return;
    }

    fetch(API+"?action=login&pin="+encodeURIComponent(pin))

    .then(r=>r.json())

    .then(data=>{

        if(data.success){

            localStorage.setItem("brand",data.brand);

            document.getElementById("namaBrand").innerHTML=
            "Brand : <b>"+data.brand+"</b>";

            document.getElementById("loginBox").style.display="none";

            document.getElementById("produk").style.display="block";

            loadProduk();

        }else{

            alert("PIN salah");

        }

    });

}


/* ============================
   LOGOUT
============================ */

function logout(){

    if(!confirm("Keluar dari aplikasi?")) return;

    localStorage.removeItem("brand");

    location.reload();

}


/* ============================
   LOAD PRODUK
============================ */

function loadProduk(){

    const brand=localStorage.getItem("brand");

    fetch(API+"?action=list&brand="+encodeURIComponent(brand))

    .then(r=>r.json())

    .then(data=>{

        semuaProduk=data;

        tampilkanProduk(data);

    });

}


/* ============================
   TAMPILKAN PRODUK
============================ */

function tampilkanProduk(data){

    let html="";

    data.forEach(p=>{

        html+=`

<div class="item">

    <div>

        <div class="badge">

            PRODUK

        </div>

        <div class="tipe">

            ${p.tipe}

        </div>

        <div class="label">

            Harga Saat Ini

        </div>

        <div class="harga">

            Rp ${Number(p.harga).toLocaleString("id-ID")}

        </div>

    </div>

    <div>

        <button

            class="btn-ubah"

            onclick="edit('${p.tipe}','${p.harga}')">

            ✏ Ubah Harga

        </button>

    </div>

</div>

`;

    });

    document.getElementById("listProduk").innerHTML=html;

}
  /* ============================
   EDIT
============================ */

function edit(tipe,harga){

    selectedTipe=tipe;

    document.getElementById("hargaLama").value=harga;
    document.getElementById("hargaBaru").value=harga;
    document.getElementById("catatan").value="";

    document.getElementById("formEdit").style.display="flex";

}


/* ============================
   TUTUP POPUP
============================ */

function closeEdit(){

    document.getElementById("formEdit").style.display="none";

}


/* ============================
   SIMPAN
============================ */

function simpan(){

    const brand=localStorage.getItem("brand");

    const harga=document.getElementById("hargaBaru").value.trim();

    const catatan=document.getElementById("catatan").value.trim();

    if(harga==""){

        alert("Harga baru belum diisi.");

        return;

    }

    fetch(

        API+

        "?action=update"+

        "&brand="+encodeURIComponent(brand)+

        "&tipe="+encodeURIComponent(selectedTipe)+

        "&harga="+encodeURIComponent(harga)+

        "&catatan="+encodeURIComponent(catatan)

    )

    .then(r=>r.json())

    .then(res=>{

        if(res.success){

            alert("✅ Harga berhasil diperbarui");

            closeEdit();

            loadProduk();

        }else{

            alert("❌ Gagal memperbarui harga");

        }

    });

}


/* ============================
   SEARCH
============================ */

document.getElementById("search").addEventListener("input",function(){

    const keyword=this.value.toLowerCase();

    const hasil=semuaProduk.filter(p=>

        p.tipe.toLowerCase().includes(keyword)

    );

    tampilkanProduk(hasil);

});


/* ============================
   AUTO LOGIN
============================ */

window.onload=function(){

    const brand=localStorage.getItem("brand");

    if(brand){

        document.getElementById("namaBrand").innerHTML=
        "Brand : <b>"+brand+"</b>";

        document.getElementById("loginBox").style.display="none";

        document.getElementById("produk").style.display="block";

        loadProduk();

    }

};

</script>

</body>

</html>
